# Publishes the static site at repo root to GitHub Pages (public repo required for free org Pages).
name: Deploy landing (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "og-card.svg"
      - "terminal-demo.svg"
      - ".github/workflows/deploy-landing.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-getskillpack-landing
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
